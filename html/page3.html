<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thiết kế form đăng ký</title>
    <meta charset="UTF-8">
    <link href="../css/style3.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <form>
            <h2 id="title">Register Form</h2>

            <div class="form-group">
                <label for="txHọ và tên">Họ và tên:</label>
                <input type="text" id="txHọ và tên" name="txHọ và tên">
            </div>
			
			<div class="form-group">
                <label for="txNgày/tháng/năm sinh">Ngày/tháng/năm sinh:</label>
                <input type="text" id="txNgày/tháng/năm sinh" name="txNgày/tháng/năm sinh">
            </div>
			
			<div class="form-group">
                <label for="txĐịa chỉ">Địa chỉ:</label>
                <input type="text" id="txĐịa chỉ" name="txĐịa chỉ">
            </div>

            <div class="form-group">
                <label for="txEmail">Email:</label>
                <input type="email" id="txEmail" name="txEmail">
            </div>

            <div class="form-group">
                <label for="txPassword">Password:</label>
                <input type="password" id="txPassword" name="txPassword">
            </div>
			
            <input type="submit" name="sbRegister" id="sbRegister" value="Register">

            <input type="reset" name="rsCancel" id="rsCancel" value="Cancel">

        </form>

    </div>

</body>
</html>
