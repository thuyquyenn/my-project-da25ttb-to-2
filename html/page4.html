<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Hiể thị câu chào với hộp thoại alert()</title>
    <meta charset="UTF-8">
    <link rel ="stylesheet" href="../css/style3.css">
</head>

<body>

    <div class="container">
        <p id = "name">
               Quyên
        </p>
    </div>
    <script>
        let name = document.getElementById("name").innerHTML;

        window.alert("Xin chào" + name + "Chúc buổi chiều mát mẻ");
    </script>

</body>
</html>
