<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Nhập dữ liệu và hiển thị với prompt và alert()</title>
    <meta charset="UTF-8">
    <link rel ="stylesheet" href="../css/style3.css">
</head>
<body>
    <script>
        let name = prompt("Nhập vào tên của bạn:");
        let yob = Number(prompt("Nhập vào năm sinh của bạn:"));
        alert(" Xin chào " + name + ", Năm 2026 bạn đã " + (2026 - yob) + " tuổi rồi nge.");
    </script>
</body>
</html>
